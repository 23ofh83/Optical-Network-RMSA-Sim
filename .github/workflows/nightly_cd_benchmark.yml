name: 🌙 Nightly Capacity Benchmark & CD Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  capacity_stress_test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出仓库最新重构代码
        uses: actions/checkout@v4

      - name: 2. 配置标准工业级 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 一键安装全量依赖缓存
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 运行全量配置仿真验证平台
        run: |
          python main.py

      - name: 5. 自动编译数据分析图表报告
        run: |
          python report_generator.py

      - name: 6. 自动化产物分发归档 (Artifact Delivery)
        uses: actions/upload-artifact@v4
        with:
          name: Automated-Performance-Report
          path: |
            plots/
            reports/
            my_simulation_results.csv